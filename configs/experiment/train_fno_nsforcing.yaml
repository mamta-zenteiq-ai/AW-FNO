# FNO baseline on the NS-forcing 128×128 super-resolution task.
experiment_name: fno_nsforcing_sr

model: fno_ns128
dataset: nsforcing_sr

epochs: 500
learning_rate: 1.0e-3
weight_decay: 1.0e-4
optimizer: adam
scheduler: step
scheduler_step_size: 100
scheduler_gamma: 0.5

seed: 42
device: cuda
amp: false
grad_clip: 1.0

log_every: 25
save_every: 100
use_wandb: false
wandb_project: aw-fno

output_dir: results/fno_nsforcing_sr
