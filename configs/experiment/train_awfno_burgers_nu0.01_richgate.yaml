# AW-FNO rich gate on PDEBench Burgers Nu=0.01 (smoother-shock sweep point).
# Compared against the Nu=0.001 rich-gate run to show routing strength scales
# with shock sharpness.
experiment_name: awfno_burgers_nu0.01_richgate

model: awfno_pdebench_burgers
dataset: pdebench_burgers_nu0.01

lambda_ent: 0.01
rich_gate:
  kernel_size: 5
  hidden_layers: 2

epochs: 300
learning_rate: 1.0e-3
weight_decay: 1.0e-4
optimizer: adam
scheduler: step
scheduler_step_size: 100
scheduler_gamma: 0.5

seed: 42
device: cuda
amp: false
grad_clip: 1.0

log_every: 25
save_every: 100
use_wandb: false
wandb_project: aw-fno

output_dir: results/awfno_burgers_nu0.01_richgate
