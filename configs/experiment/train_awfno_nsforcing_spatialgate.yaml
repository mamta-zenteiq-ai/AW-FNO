# AW-FNO with a SINGLE-CHANNEL SPATIAL GATE on NS-forcing 128² SR.
# α(x,y) ∈ R^{B×1×H×W} shared across all feature channels: removes the
# per-channel escape that made the rich gate route by channel (ρ≈0). Forces the
# gate to be decisive SPATIALLY. Tests whether genuine spatial routing emerges
# on turbulence and at what accuracy cost vs the per-channel rich gate (0.0090).
experiment_name: awfno_nsforcing_sr_spatialgate

model: awfno_ns128
dataset: nsforcing_sr

lambda_ent: 0.01
spatial_gate:
  kernel_size: 5
  hidden_layers: 2

epochs: 500
learning_rate: 1.0e-3
weight_decay: 1.0e-4
optimizer: adam
scheduler: step
scheduler_step_size: 100
scheduler_gamma: 0.5

seed: 42
device: cuda
amp: false
grad_clip: 1.0

log_every: 25
save_every: 100
use_wandb: false
wandb_project: aw-fno

output_dir: /media/HDD/mamta_backup/aw_fno_results/awfno_nsforcing_sr_spatialgate
