# Ablation: AW-FNO with fixed alpha=0.5 (no gate) on PDEBench 1D Riemann.
# Regime control for the multi-wave dataset: tests whether uniform mixing
# suffices, or whether routing to WNO at the shock/contact is needed.
experiment_name: awfno_riemann_no_gate

model: awfno_pdebench_burgers
dataset: pdebench_riemann

ablation_fixed_gate: true

epochs: 300
learning_rate: 1.0e-3
weight_decay: 1.0e-4
optimizer: adam
scheduler: step
scheduler_step_size: 100
scheduler_gamma: 0.5

seed: 42
device: cuda
amp: false
grad_clip: 1.0

log_every: 25
save_every: 100
use_wandb: false
wandb_project: aw-fno

output_dir: results/awfno_riemann_no_gate
