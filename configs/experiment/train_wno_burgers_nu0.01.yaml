# WNO baseline on PDEBench Burgers Nu=0.01 (viscosity-sweep point).
experiment_name: wno_burgers_nu0.01

model: wno_pdebench_burgers
dataset: pdebench_burgers_nu0.01

epochs: 300
learning_rate: 1.0e-3
weight_decay: 1.0e-4
optimizer: adam
scheduler: step
scheduler_step_size: 100
scheduler_gamma: 0.5

seed: 42
device: cuda
amp: false
grad_clip: 1.0

log_every: 25
save_every: 100
use_wandb: false
wandb_project: aw-fno

output_dir: results/wno_burgers_nu0.01
