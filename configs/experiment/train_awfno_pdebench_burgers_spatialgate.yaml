# AW-FNO with a SINGLE-CHANNEL SPATIAL GATE on PDEBench Burgers Nu=0.001.
# Shock-regime control for the spatial-gate experiment: here spatial routing is
# expected to help (shocks are localised), so a channel-shared spatial gate
# should route WNO at shock fronts (ρ((1-α),|∂u/∂x|) > 0) without the channel
# escape.
experiment_name: awfno_pdebench_burgers_spatialgate

model: awfno_pdebench_burgers
dataset: pdebench_burgers

lambda_ent: 0.01
spatial_gate:
  kernel_size: 5
  hidden_layers: 2

epochs: 500
learning_rate: 1.0e-3
weight_decay: 1.0e-4
optimizer: adam
scheduler: step
scheduler_step_size: 100
scheduler_gamma: 0.5

seed: 42
device: cuda
amp: false
grad_clip: 1.0

log_every: 25
save_every: 100
use_wandb: false
wandb_project: aw-fno

output_dir: /media/HDD/mamta_backup/aw_fno_results/awfno_pdebench_burgers_spatialgate
