# Kernel-sweep variant (B3): AW-FNO rich gate, kernel_size=7, on PDEBench
# Burgers Nu=0.001. Companion to the k=5 run (train_awfno_pdebench_burgers_richgate.yaml).
# Tests whether a wider gate receptive field strengthens spatial shock routing
# ρ((1-α),|∂u/∂x|).
experiment_name: awfno_pdebench_burgers_richgate_k7

model: awfno_pdebench_burgers
dataset: pdebench_burgers

lambda_ent: 0.01
rich_gate:
  kernel_size: 7
  hidden_layers: 2

epochs: 500
learning_rate: 1.0e-3
weight_decay: 1.0e-4
optimizer: adam
scheduler: step
scheduler_step_size: 100
scheduler_gamma: 0.5

seed: 42
device: cuda
amp: false
grad_clip: 1.0

log_every: 25
save_every: 100
use_wandb: false
wandb_project: aw-fno

output_dir: /media/HDD/mamta_backup/aw_fno_results/awfno_pdebench_burgers_richgate_k7
