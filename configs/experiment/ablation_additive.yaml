# Ablation: AW-FNO with additive fusion (v_fno + v_wno) instead of gated.
#
# Together with `ablation_no_gate.yaml` (fixed 0.5/0.5 mix), this isolates
# two distinct contributions of the adaptive gate:
#
#   1. ablation_no_gate    : equal-weight convex combination (α = 0.5)
#   2. ablation_additive   : unconstrained sum (no convex constraint, no gate)
#   3. AW-FNO              : learned, spatially adaptive convex combination
#
# Expected order (worst → best): additive < fixed-0.5 < adaptive-gate.
# If additive ≈ adaptive-gate, the gate is providing no value.
experiment_name: awfno_ns_additive
model: awfno_ns
dataset: ns2d

# Flag picked up by `_patch_additive_fusion` in experiments/train.py.
ablation_additive_fusion: true

epochs: 500
learning_rate: 1.0e-3
weight_decay: 1.0e-4
optimizer: adam
scheduler: step
scheduler_step_size: 100
scheduler_gamma: 0.5

seed: 42
device: cuda
amp: false
grad_clip: 1.0

log_every: 50
save_every: 100
use_wandb: false
wandb_project: aw-fno

output_dir: results/awfno_ns_additive
