name: awfno
variant: v1

in_channels: 1
out_channels: 1

# Fourier modes — scaled for 128×128 resolution (≈ res / 6.4)
n_modes: [20, 20]

# Spatial grid size (must match dataset HR resolution)
size: [128, 128]

hidden_channels: 32
n_layers: 4

wno_level: 3
wno_wavelet: db6

lifting_channel_ratio: 2
projection_channel_ratio: 2
positional_embedding: grid
padding: 0

dropout: 0.0
norm: layer_norm
