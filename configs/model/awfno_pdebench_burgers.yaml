name: awfno

in_channels: 1
out_channels: 1

# 1D Fourier modes — keep low to test how well WNO branch handles the shock
n_modes: [16]

# Spatial grid size (must match dataset resolution)
size: [1024]

hidden_channels: 64
n_layers: 4

# Wavelet branch: 3 decomposition levels with db6 (sharp-feature friendly)
wno_level: 3
wno_wavelet: db6

lifting_channel_ratio: 2
projection_channel_ratio: 2
positional_embedding: grid
padding: 0

dropout: 0.0
norm: layer_norm
